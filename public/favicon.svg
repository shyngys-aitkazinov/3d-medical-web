    <path d="M14 50 C 14 30, 30 30, 32 20 C 34 12, 44 12, 50 18"/>
  </g>
  <circle cx="32" cy="20" r="5" fill="#22d3ee"/>
  <circle cx="32" cy="20" r="9" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="2 3"/>
</svg>
