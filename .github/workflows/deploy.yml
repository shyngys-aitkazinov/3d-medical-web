name: Build & deploy to Infomaniak

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't let two deploys race; cancel an older one if a newer push lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ship:
    name: Build, test, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build static export
        run: npm run build

      # The static export lands in ./out — that's what we ship.
      - name: Verify build output
        run: test -f out/index.html && test -f out/founder.jpg

      # Single-step deploy via sshpass + rsync.
      #
      # Path layout on Infomaniak shared hosting:
      #   • SSH login lands the user in /home/clients/<accountid>/  (= $HOME).
      #   • The site lives at ~/sites/3d-medical.ch — that's the dir whose
      #     contents are served at https://3d-medical.ch.
      # We do everything via a $HOME-relative path so the workflow stays
      # portable across accounts and Infomaniak chroot boundary changes.
      #
      # Safety guards (in order):
      #   1. cd into the site dir, then refuse to proceed unless .htaccess
      #      is present — this both confirms the path is correct and guards
      #      against ever scribbling into the wrong directory.
      #   2. Surgically rm -rf _next (the only dir that accumulates stale
      #      hashed chunks between builds).
      #   3. rsync without --delete, so any remote-only file (.htaccess,
      #      .user.ini, .infomaniak-maintenance.html — all Infomaniak-owned)
      #      stays exactly where it is. Our build never produces dotfiles, so
      #      the upload set is provably append/overwrite-only on stable names.
      - name: Deploy to Infomaniak (rsync over SSH)
        env:
          SSHPASS: ${{ secrets.INFOMANIAK_PASSWORD }}
          HOST: ${{ secrets.INFOMANIAK_HOST }}
          USER: ${{ secrets.INFOMANIAK_USER }}
          SITE_PATH: sites/3d-medical.ch
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass rsync

          # ssh-level retry (ConnectionAttempts) handles per-attempt connection
          # blips; the bash retry() wrapper handles upstream issues like DNS
          # resolution failures on the runner, where ssh never even gets to
          # connect. Combined, the deploy is robust to one-off network hiccups.
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20 -o ConnectionAttempts=3"

          retry() {
            # Usage: retry <max-attempts> <initial-delay-seconds> -- <cmd...>
            local max="$1" delay="$2" attempt=1
            shift 2
            [ "$1" = "--" ] && shift
            while true; do
              if "$@"; then return 0; fi
              if [ "$attempt" -ge "$max" ]; then
                echo "::error::Failed after $max attempts: $*" >&2
                return 1
              fi
              echo "Attempt $attempt failed; retrying in ${delay}s..." >&2
              sleep "$delay"
              delay=$((delay * 2))
              attempt=$((attempt + 1))
            done
          }

          echo "::group::Probe site directory"
          retry 3 5 -- sshpass -e ssh $SSH_OPTS "$USER@$HOST" "
            set -eu
            cd \"$SITE_PATH\" || { echo 'ABORT: $SITE_PATH not found from $(pwd)'; ls -la; exit 1; }
            echo \"Now in: \$(pwd)\"
            if [ ! -f .htaccess ]; then
              echo 'ABORT: site dir missing .htaccess — refusing to deploy.'
              ls -la
              exit 1
            fi
            echo 'Site root verified.'
          "
          echo "::endgroup::"

          echo "::group::Clean stale _next/"
          retry 3 5 -- sshpass -e ssh $SSH_OPTS "$USER@$HOST" "
            set -eu
            cd \"$SITE_PATH\"
            if [ -d _next ]; then
              echo 'Removing stale _next/ ...'
              rm -rf _next
            else
              echo 'No previous _next/ — first deploy.'
            fi
          "
          echo "::endgroup::"

          echo "::group::Upload out/ via rsync"
          # -rltvz: recurse, preserve symlinks/times, verbose, compress.
          # --no-perms/owner/group: Infomaniak shared denies chmod, so don't
          # try to set them (would produce noisy errors with no real effect).
          # No --delete: remote-only files (host dotfiles) are preserved.
          # rsync is idempotent — retrying after a partial upload only
          # transfers what's missing.
          retry 3 5 -- sshpass -e rsync -rltvz --no-perms --no-owner --no-group \
            -e "ssh $SSH_OPTS" \
            out/ "$USER@$HOST:$SITE_PATH/"
          echo "::endgroup::"

          echo "Deploy complete."
