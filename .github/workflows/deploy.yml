name: Build & deploy to Infomaniak

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't let two deploys race; cancel an older one if a newer push lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ship:
    name: Build, test, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build static export
        run: npm run build

      # The static export lands in ./out — that's what we ship.
      - name: Verify build output
        run: test -f out/index.html && test -f out/founder.jpg

      # Single-step deploy via sshpass + rsync.
      #
      # Why not appleboy/scp-action: it requires a hard-coded absolute target
      # path. Infomaniak shared hosting puts the SSH user inside a chroot where
      # ~ IS the site root — there is no stable absolute path to embed.
      #
      # Safety guards (in order):
      #   1. Verify we're in the site root by requiring .htaccess to exist
      #      before touching anything. If we land somewhere else, abort.
      #   2. Surgically rm -rf _next (the only dir that accumulates stale
      #      hashed chunks between builds).
      #   3. rsync without --delete, so any remote-only file (.htaccess,
      #      .user.ini, .infomaniak-maintenance.html — all Infomaniak-owned)
      #      stays exactly where it is. Our build never produces dotfiles, so
      #      the upload set is provably append/overwrite-only on stable names.
      - name: Deploy to Infomaniak (rsync over SSH)
        env:
          SSHPASS: ${{ secrets.INFOMANIAK_PASSWORD }}
          HOST: ${{ secrets.INFOMANIAK_HOST }}
          USER: ${{ secrets.INFOMANIAK_USER }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass rsync

          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20"

          echo "::group::Probe remote site root"
          sshpass -e ssh $SSH_OPTS "$USER@$HOST" '
            set -eu
            echo "Remote pwd: $(pwd)"
            if [ ! -f .htaccess ]; then
              echo "ABORT: $(pwd) does not contain .htaccess — refusing to deploy."
              ls -la
              exit 1
            fi
            echo "Site root verified."
          '
          echo "::endgroup::"

          echo "::group::Clean stale _next/"
          sshpass -e ssh $SSH_OPTS "$USER@$HOST" '
            set -eu
            if [ -d _next ]; then
              echo "Removing stale _next/ ..."
              rm -rf _next
            else
              echo "No previous _next/ — first deploy."
            fi
          '
          echo "::endgroup::"

          echo "::group::Upload out/ via rsync"
          # -a archive (preserves times, perms — but Infomaniak forbids chmod
          # on shared, so we strip --no-perms/owner/group to avoid noisy errors).
          # No --delete: remote-only files (host dotfiles) are preserved.
          sshpass -e rsync -rltvz --no-perms --no-owner --no-group \
            -e "ssh $SSH_OPTS" \
            out/ "$USER@$HOST:./"
          echo "::endgroup::"

          echo "Deploy complete."
